version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      next-react:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@next/*"
      supabase:
        patterns:
          - "@supabase/*"
          - "supabase"
      test-tooling:
        patterns:
          - "@playwright/*"
          - "playwright"
          - "eslint*"
          - "prettier"
